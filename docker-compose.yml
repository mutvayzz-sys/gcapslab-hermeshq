services:
  postgres:
    image: postgres:16
    container_name: hermeshq-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hermeshq}
      POSTGRES_USER: ${POSTGRES_USER:-hermeshq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hermeshq}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-hermeshq} -d ${POSTGRES_DB:-hermeshq}']
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - hermeshq_postgres:/var/lib/postgresql/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hermeshq-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hermeshq}:${POSTGRES_PASSWORD:-hermeshq}@postgres:5432/${POSTGRES_DB:-hermeshq}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      AUTH_MODE: ${AUTH_MODE:-local}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      OIDC_SCOPE: ${OIDC_SCOPE:-openid profile email}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-OIDC Provider}
      OIDC_PROVIDER_SLUG: ${OIDC_PROVIDER_SLUG:-generic}
      OIDC_POST_LOGOUT_REDIRECT_URI: ${OIDC_POST_LOGOUT_REDIRECT_URI:-}
      OIDC_AUTO_PROVISION_USERS: ${OIDC_AUTO_PROVISION_USERS:-false}
      OIDC_VISIBLE_PROVIDERS: ${OIDC_VISIBLE_PROVIDERS:-}
      OIDC_PROVIDER_LOGIN_URL_GOOGLE: ${OIDC_PROVIDER_LOGIN_URL_GOOGLE:-}
      OIDC_PROVIDER_LOGIN_URL_MICROSOFT: ${OIDC_PROVIDER_LOGIN_URL_MICROSOFT:-}

      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-Hermes Operator}
      WORKSPACES_ROOT: ${WORKSPACES_ROOT:-/app/workspaces}
      BRANDING_ROOT: ${BRANDING_ROOT:-/app/workspaces/_branding}
      PTY_SHELL: ${PTY_SHELL:-/bin/sh}
      CORS_ORIGINS: '${CORS_ORIGINS_JSON:-["http://localhost:3420","http://frontend","https://hq.gcaplabs.com"]}'
      CONCURRENCY_SEMAPHORE: ${CONCURRENCY_SEMAPHORE:-8}
      HQ_BOOTSTRAP_TIMEOUT: ${HQ_BOOTSTRAP_TIMEOUT:-30}
      HQ_BOOTSTRAP_RETRIES: ${HQ_BOOTSTRAP_RETRIES:-2}
      # Public domain used to build container endpoint URLs sent to the desktop app.
      # Set to the public-facing URL, e.g. "https://hq.gcaplabs.com"
      # Containers are proxied through nginx at /runtime/{container-name}/ — no ports exposed.
      CONTAINER_HOST_URL: ${CONTAINER_HOST_URL:-}
      OPEN_SIGNUP: ${OPEN_SIGNUP:-false}
    volumes:
      - hermeshq_workspaces:/app/workspaces
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    expose:
      - '8000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.8'
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
      - default
      - hermes_runtime

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: hermeshq-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '${FRONTEND_PORT:-3420}:80'
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - default
      - hermes_runtime

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: hermeshq-tunnel
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - /Users/mattywow/.cloudflared/28e28a4e-343c-4ba2-acdb-09a0fc24d296.json:/etc/cloudflared/28e28a4e-343c-4ba2-acdb-09a0fc24d296.json:ro
      - /Users/mattywow/.cloudflared/hermeshq.yml:/etc/cloudflared/config.yml:ro
    depends_on:
      frontend:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - default

volumes:
  hermeshq_postgres:
  hermeshq_workspaces:

networks:
  internal:
    internal: true
  default:
  hermes_runtime:
    name: hermes_runtime
