# ============================================================
# Rate limiting zones — add these to the http {} block in the
# main nginx.conf (not inside a server block):
#
# limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
# limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/m;
#
# Then reference them in location blocks:
#   limit_req zone=login burst=5 nodelay;      # for /api/auth/login
#   limit_req zone=api_general burst=20 nodelay; # for general /api/
# ============================================================

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ----------------------------------------------------------
  # Security headers
  # ----------------------------------------------------------
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' ws: wss:; frame-ancestors 'none';" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # ----------------------------------------------------------
  # Gzip compression for text-based responses
  # ----------------------------------------------------------
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml
    font/woff2;

  # ----------------------------------------------------------
  # Health endpoint
  # ----------------------------------------------------------
  location /api/health {
    proxy_pass http://backend:8000/health;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
  }

  # ----------------------------------------------------------
  # Login endpoint — stricter rate limiting
  # NOTE: To enable rate limiting, add to the http {} block in the main nginx.conf:
  #   limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
  # Then uncomment the limit_req directive below.
  # ----------------------------------------------------------
  location /api/auth/login {
    proxy_pass http://backend:8000/api/auth/login;
    proxy_http_version 1.1;

    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
  }

  # ----------------------------------------------------------
  # API proxy
  # ----------------------------------------------------------
  # Allow large file uploads (attachments up to 100MB)
  client_max_body_size 100m;

  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_http_version 1.1;

    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;

    # NOTE: To enable rate limiting, add to the http {} block in main nginx.conf:
    #   limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/m;
    # Then add: limit_req zone=api_general burst=20 nodelay;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
    proxy_send_timeout 60s;
  }

  # ----------------------------------------------------------
  # Webhook endpoints (Teams, Google Chat)
  # These receive incoming events from external platforms.
  location /webhooks/ {
    proxy_pass http://backend:8000/webhooks/;
    proxy_http_version 1.1;

    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
    proxy_send_timeout 30s;
  }

  # ----------------------------------------------------------
  # WebSocket proxy
  # ----------------------------------------------------------
  location /ws/ {
    proxy_pass http://backend:8000/ws/;
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;

    # Extended timeouts for long-lived WebSocket connections
    proxy_connect_timeout 10s;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # ----------------------------------------------------------
  # MCP endpoints — health, analytics, SSE-friendly proxy
  # ----------------------------------------------------------
  location /mcp {
    proxy_pass http://backend:8000/mcp;
    proxy_http_version 1.1;

    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;

    # SSE support: disable buffering so events stream immediately
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Connection '';

    # Long timeouts for SSE keep-alive and sync invoke (up to 120s)
    proxy_connect_timeout 10s;
    proxy_read_timeout 180s;
    proxy_send_timeout 120s;
  }

  # ----------------------------------------------------------
  # Static assets — long-lived cache
  # ----------------------------------------------------------
  location ~* \.(js|css)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
    expires 6M;
    add_header Cache-Control "public";
    access_log off;
  }

  # ----------------------------------------------------------
  # SPA fallback
  # ----------------------------------------------------------
  location / {
    try_files $uri /index.html;
  }
}
