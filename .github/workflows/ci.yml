name: CI

on:
  push:
    branches: [main, unstable]
  pull_request:
    branches: [main, unstable]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend tests ─────────────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hermeshq
          POSTGRES_PASSWORD: hermeshq
          POSTGRES_DB: hermeshq
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hermeshq"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://hermeshq:hermeshq@localhost:5432/hermeshq
      JWT_SECRET: ci-test-secret-key
      AUTH_MODE: local

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --quiet -r backend/requirements.txt
          pip install --quiet pytest pytest-asyncio

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short --ignore=tests/test_gateway_supervisor_crash_loop.py --ignore=tests/test_regressions.py --ignore=tests/test_response_attachments.py

      - name: Run full backend tests (including known failures)
        if: always()
        continue-on-error: true
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short

  # ── Frontend build ────────────────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # ── Docker build ──────────────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
